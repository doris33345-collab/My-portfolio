      const LucideIcon = ({ name, className = "" }) => {
        const iconRef = useRef(null);
        useEffect(() => {
          if (iconRef.current) {
            // Clear existing
            iconRef.current.innerHTML = "";
            const icon = lucide.icons[name];
            if (icon) {
              const svg = lucide.createSvg(icon, { class: className });
              iconRef.current.appendChild(svg);
            }
          }
        }, [name, className]);
        return <span ref={iconRef} className="inline-flex items-center justify-center" />;
      };

// --- Component: OverviewStats.tsx ---



interface StatItemProps {
  number: number;
  suffix: string;
  title: string;
  subTitle: string;
  description: string;
  color: string;
  delay: number;
}

function StatItem({ number, suffix, title, subTitle, description, color, delay }: StatItemProps) {
  const count = useMotionValue(0);
  const [displayValue, setDisplayValue] = useState(0);
  const ref = useRef(null);
  const isInView = useInView(ref, { once: true, margin: "-50px" });

  useEffect(() => {
    if (isInView) {
      const controls = animate(count, number, {
        duration: 2,
        delay: delay,
        ease: [0.16, 1, 0.3, 1],
        onUpdate: (latest) => setDisplayValue(Math.round(latest))
      });
      return () => controls.stop();
    }
  }, [isInView, number, count, delay]);

  return (
    <motion.div
      ref={ref}
      initial={{ opacity: 0, y: 15 }}
      animate={isInView ? { opacity: 1, y: 0 } : { opacity: 0, y: 15 }}
      transition={{ duration: 0.8, delay, ease: [0.16, 1, 0.3, 1] }}
      className="flex flex-col items-start text-left gap-3 md:gap-4 relative p-5 md:p-8 rounded-[28px] md:rounded-[32px] bg-white border border-black/[0.03] shadow-[0_4px_20px_rgba(0,0,0,0.01)] hover:shadow-[0_20px_50px_rgba(0,0,0,0.06)] transition-all duration-500 group cursor-default"
    >
      <div className="flex flex-col items-start gap-1 relative z-10 text-left">
        <div className="flex items-baseline gap-1 relative">
          <span className={`text-4xl md:text-5xl font-black tracking-tighter ${color} transition-transform duration-500 group-hover:scale-105 origin-left`}>
            {displayValue}
          </span>
          <span className={`text-lg md:text-xl font-black italic ${color}`}>{suffix}</span>
          
          {/* Hand-drawn Underline Accent (left-aligned) */}
          <motion.svg 
            viewBox="0 0 100 20" 
            className={`absolute -bottom-1.5 left-0 w-full h-2 ${color} opacity-30`}
            initial={{ pathLength: 0 }}
            animate={isInView ? { pathLength: 1 } : { pathLength: 0 }}
            transition={{ duration: 1, delay: delay + 0.5 }}
          >
            <path d="M 0 10 Q 50 20 100 10" stroke="currentColor" strokeWidth="8" fill="none" strokeLinecap="round" />
          </motion.svg>
        </div>
        
        <div className="flex flex-col items-start mt-3 text-left">
          <span className="text-[14px] md:text-base font-black text-ink tracking-tight uppercase">{title}</span>
          <span className="text-[10px] uppercase font-black tracking-[0.2em] text-ink/20 italic">{subTitle}</span>
        </div>
      </div>
      
      {/* Description that expands on hover */}
      <div className="relative overflow-hidden transition-all duration-500 max-h-0 group-hover:max-h-[120px] opacity-0 group-hover:opacity-100">
        <p className="text-[11px] md:text-xs leading-relaxed text-ink/50 font-medium max-w-full text-left pt-2">
          {description}
        </p>
      </div>

      {/* Floating Sparkle Icon */}
      <div className={`absolute top-6 right-6 opacity-0 group-hover:opacity-100 transition-all duration-500 translate-y-2 group-hover:translate-y-0 ${color}`}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z" />
        </svg>
      </div>

      {/* Very subtle background light on hover */}
      <div className={`absolute inset-0 rounded-[32px] bg-current opacity-0 group-hover:opacity-[0.02] transition-opacity duration-500 pointer-events-none ${color.replace('text-', 'bg-')}`} />
    </motion.div>
  );
}

// --- Component: MastergoProjects.tsx ---




interface ProjectProps {
  tabName: string;
  title: string;
  subtitle: string;
  description: string;
  tags: string[];
  image: string;
  handwritten?: string;
  link?: string;
}

function MastergoProjects({ projects }: { projects: ProjectProps[] }) {
  const [activeIndex, setActiveIndex] = useState(0);

  return (
    <div className="w-full max-w-5xl mx-auto px-6 py-16 md:py-24">
      
      {/* Creative Tab Switcher */}
      <div className="flex items-center justify-between md:justify-center gap-4 sm:gap-6 md:gap-16 mb-6 md:mb-8 relative z-20 overflow-x-auto pb-4 scrollbar-hide no-scrollbar w-full">
        {projects.map((project, idx) => {
          const isActive = activeIndex === idx;
          return (
            <button
              key={idx}
              onClick={() => setActiveIndex(idx)}
              className="group flex flex-col items-center relative outline-none flex-shrink-0"
            >
              <div className="flex items-baseline gap-1 md:gap-2">
                <span 
                  className={`text-sm sm:text-base md:text-[20px] italic font-black transition-colors duration-500 ${isActive ? "text-pill-orange" : "text-ink/30 group-hover:text-ink/60"}`}
                  style={{ fontFamily: "Verdana" }}
                >
                  0{idx + 1}
                </span>
                <span 
                  className={`text-sm sm:text-base md:text-2xl font-bold tracking-tight not-italic transition-colors duration-500 ${isActive ? "text-ink" : "text-ink/30 group-hover:text-ink/60"}`}
                  style={{ fontFamily: "Arial" }}
                >
                  {project.tabName}
                </span>
              </div>
              
              <div className="h-[2px] md:h-[3px] bg-ink/5 w-full mt-2 md:mt-3 rounded-full overflow-hidden relative">
                {isActive && (
                  <motion.div
                    layoutId="creativeNavLine"
                    className="absolute inset-0 bg-pill-orange rounded-full"
                    transition={{ type: "spring", stiffness: 300, damping: 30 }}
                  />
                )}
              </div>
            </button>
          );
        })}
      </div>

      {/* Content Showcase Area - 3D Perspective Card Stack */}
      <div className="grid w-full max-w-5xl mx-auto perspective-[1200px] pb-8 md:pb-12">
        {/* Render all projects stacked */}
        {projects.map((project, idx) => {
          const isActive = activeIndex === idx;
          const isBehind = !isActive;

          return (
            <motion.div
              key={idx}
              initial={false}
              animate={{
                opacity: isActive ? 1 : 0.6,
                scale: isActive ? 1 : 0.94,
                y: isActive ? 0 : 30,
                rotateX: isActive ? 0 : 3,
                zIndex: isActive ? 20 : 10,
              }}
              whileHover={isBehind ? { scale: 0.95, y: 25, opacity: 0.8 } : {}}
              transition={{ duration: 0.7, ease: [0.16, 1, 0.3, 1] }}
              onClick={() => {
                if (isBehind) {
                  setActiveIndex(idx);
                } else if (project.link) {
                  window.open(project.link, "_blank");
                }
              }}
              className={`col-start-1 row-start-1 w-full h-full flex flex-col md:flex-row gap-5 md:gap-8 lg:gap-14 items-center bg-white p-5 sm:p-8 md:p-10 lg:p-16 rounded-[28px] md:rounded-[40px] shadow-[0_30px_80px_-20px_rgba(0,0,0,0.15)] border border-black/[0.03] transform-gpu ${
                isBehind ? "cursor-pointer" : "cursor-pointer"
              }`}
            >
              {/* Fade out content of the unfocused card to make stack cleaner */}
              <motion.div 
                animate={{ opacity: isActive ? 1 : 0.2 }}
                transition={{ duration: 0.4 }}
                className={`w-full h-full flex flex-col md:flex-row gap-5 md:gap-8 lg:gap-14 items-center ${isBehind ? 'pointer-events-none' : 'pointer-events-auto'}`}
              >
                {/* Left Box: Text */}
                <div className="w-full md:w-[45%] lg:w-[42%] flex flex-col gap-4 md:gap-6 justify-center text-left">
                  <div className="flex flex-wrap gap-2">
                    {project.tags.map((tag, i) => (
                      <span key={i} className="px-2.5 py-1 md:px-3 md:py-1.5 bg-[#f5f5f7] text-[#1a1a1a]/80 text-[10px] md:text-sm font-semibold rounded-lg">
                        {tag}
                      </span>
                    ))}
                  </div>

                  <div className="relative inline-block w-fit mt-1 md:mt-2">
                    <h3 
                      className="text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-bold not-italic tracking-tight text-[#1a1a1a] leading-[1.2] whitespace-pre-wrap"
                      style={{ fontFamily: "Georgia" }}
                    >
                      {project.title}
                    </h3>
                    {project.handwritten && (
                      <span 
                        className="hand-note text-lg md:text-2xl absolute -bottom-[18px] md:-bottom-[22px] right-[-5px] md:right-[-30px] rotate-[-5deg] -translate-y-[10px]"
                        style={{ color: "var(--color-pill-orange)" }}
                      >
                        {project.handwritten}
                      </span>
                    )}
                  </div>

                  <p className="text-xs sm:text-sm md:text-base leading-relaxed text-[#1a1a1a]/60 mt-3 md:mt-6 -translate-y-[20px]">
                    {project.description}
                  </p>

                  <div className="mt-8 flex items-center gap-3 -translate-y-[40px]">
                    <div 
                      className="px-6 py-3 bg-ink text-white rounded-full text-sm font-bold tracking-tight hover:scale-105 transition-transform flex items-center gap-2"
                    >
                      点击查看
                      <ArrowUpRight size={16} />
                    </div>
                  </div>
                </div>
                
                {/* Right Box: Image */}
                <div className="w-full md:w-[55%] lg:w-[58%] relative group h-full flex items-center justify-center mt-2 md:mt-0">
                  <div className="relative w-full aspect-[4/3] bg-[#f5f5f7] rounded-[20px] md:rounded-[32px] overflow-hidden shadow-[0_15px_30px_-10px_rgba(0,0,0,0.12)] ring-1 ring-black/5">
                    <img 
                      src={project.image} 
                      alt={project.tabName}
                      className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                      loading="lazy"
                      referrerPolicy="no-referrer"
                    />
                  </div>
                </div>
              </motion.div>
            </motion.div>
          );
        })}
      </div>
    </div>
  );
}

function Footer() {
  const [showToast, setShowToast] = useState(false);

  const handleCopy = (text: string, e: React.MouseEvent) => {
    // Prevent default for items that should just copy (like WeChat)
    // For Email/Phone, we might let the native action trigger too, but user asked for "Global Prompt"
    navigator.clipboard.writeText(text).then(() => {
      setShowToast(true);
      setTimeout(() => setShowToast(false), 2000);
    });
  };

  return (
    <footer id="contact" className="scroll-mt-24 py-8 md:py-16 max-w-5xl mx-auto px-6 relative overflow-visible">
      <div className="flex flex-col gap-12 md:gap-20">

               viewport={{ once: true }}
               className="mb-6"

             </motion.div>

               期待合作 <br/>
               <span className="inline-block relative">
                 欢迎联系
                 <svg className="absolute w-full h-4 -bottom-2 left-0 text-pill-orange" viewBox="0 0 100 20" preserveAspectRatio="none">
                   <path d="M0 10 Q 50 20 100 10" stroke="currentColor" strokeWidth="6" fill="transparent" strokeLinecap="round" />
                 </svg>
               </span>
             </h2>
          </div>
          
          <div className="flex flex-col gap-2 items-start md:items-end">
            <span className="hand-note text-2xl text-ink/40 rotate-[-4deg]">Say hi! 👋</span>
            <p className="text-sm text-ink/60 max-w-[300px] md:text-right leading-relaxed font-medium">
              逻辑的尽头是直觉，对话的开始是机遇，<br/>期待双向契合的相遇，欢迎联系。
            </p>
          </div>
        </div>

        {/* Contact Grid */}
        <div className="grid grid-cols-1 xs:grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4">
          {contactItems.map((item, i) => (
            <motion.a
              key={i}
              href={item.href}
              onClick={(e) => {
                // Email, WeChat, and Phone trigger the copy toast
                const isCopyable = item.label.includes("Email") || item.label.includes("WeChat") || item.label.includes("Phone");
                if (isCopyable) {
                  handleCopy(item.value, e);
                  // For WeChat, prevent default as href is "#"
                  if (item.href === "#") e.preventDefault();
                }
              }}
              initial={{ opacity: 0, y: 20 }}
              whileInView={{ opacity: 1, y: 0 }}
              viewport={{ once: true }}
              transition={{ duration: 0.5, delay: i * 0.1 }}
              className="group p-5 md:p-6 rounded-[24px] md:rounded-[28px] bg-white border border-black/[0.03] shadow-[0_4px_20px_rgba(0,0,0,0.02)] hover:shadow-[0_20px_50px_rgba(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-300 flex flex-col gap-3 md:gap-4 text-left relative overflow-hidden cursor-pointer"
            >
              <div className={`w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl ${item.bg} flex items-center justify-center ${item.color} group-hover:scale-110 transition-transform duration-300`}>

              <div className="space-y-0.5 md:space-y-1 relative z-10">

              </div>

              {/* Decorative background circle */}
              <div className={`absolute -right-4 -bottom-4 w-24 h-24 rounded-full ${item.bg} opacity-0 group-hover:opacity-100 transition-opacity duration-500 scale-150`} />
              
              <ArrowUpRight size={14} className="absolute top-6 right-6 text-ink/20 group-hover:text-ink/60 transition-colors" />
            </motion.a>
          ))}
        </div>

        {/* Footer Bottom */}
        <div className="flex flex-col md:flex-row justify-between items-center gap-8 pt-12 border-t border-ink/5">
           <div className="flex items-center gap-6">
              <span className="text-xs font-bold text-ink/40 uppercase tracking-widest">Based in Shanghai</span>

           <div className="flex gap-4">

          <motion.div
            initial={{ opacity: 0, y: 50, scale: 0.9, x: "-50%" }}
            animate={{ opacity: 1, y: 0, scale: 1, x: "-50%" }}
            exit={{ opacity: 0, y: 20, scale: 0.9, x: "-50%" }}

            <span className="text-sm font-bold tracking-tight">复制成功，期待合作～</span>
          </motion.div>
        )}
      </AnimatePresence>
    </footer>
  );
}
